# Render.com one-click deploy for omni-model.
services:
  - type: web
    name: omni-model
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8787"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
