name: Publish container image

# Builds and pushes a multi-arch image to GitHub Container Registry.
#   - push a semver tag (v1.2.3)  -> ghcr.io/<owner>/<repo>:1.2.3, :1.2, :latest
#   - push to main                -> ghcr.io/<owner>/<repo>:edge
#   - manual run (workflow_dispatch)
#
# Consumers then `docker pull ghcr.io/<owner>/<repo>:<tag>` — no fork, and
# updates are a pull + redeploy. The image ships no baked config; provide it at
# runtime via OMNI_CONFIG / OMNI_CONFIG_PATH / a mounted /app/omni.yaml.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

# GHCR pushes authenticate with the built-in GITHUB_TOKEN.
permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image path follows the repo, e.g. ghcr.io/tiepvuvan/omni-model.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
