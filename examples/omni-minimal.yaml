# The smallest useful omni-model configuration: one provider, in-memory
# storage, no client authentication (every request on /v1/* is accepted —
# do not expose this to the internet as-is).
#
# Run it locally:
#   OPENAI_API_KEY=sk-... node packages/node/dist/cli.js --config examples/omni-minimal.yaml
#
# Full example with auth, rate limits and routing: examples/omni.yaml
# Complete reference: docs/configuration.md
version: 1

# Rate-limit counters and attestation keys live here. "memory" works for a
# single instance; use redis/postgres (containers) or cloudflare-kv/
# durable-object (Workers) when running more than one.
storage:
  type: memory

providers:
  openai:
    type: openai
    apiKey: ${OPENAI_API_KEY}

routing:
  # No routes or model rules: every request goes straight to this provider
  # with the client-requested model.
  defaultProvider: openai
