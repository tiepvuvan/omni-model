# omni-model config for the AUTH end-to-end suite (Node target).
#
# Forwards to OpenRouter like omni.e2e.yaml, but turns on the two Firebase
# verifiers that can be checked server-side without a physical device:
#   - firebase-auth       (Firebase Authentication ID tokens)
#   - firebase-app-check  (Firebase App Check tokens)
# mode: any -> a request authenticates if EITHER credential verifies; each is
# read from a distinct header, so they are tested independently.
#
# Values come from the app's GoogleService-Info.plist via env (never committed):
#   FIREBASE_PROJECT_ID      PROJECT_ID       (firebase-auth aud/iss)
#   FIREBASE_PROJECT_NUMBER  GCM_SENDER_ID    (firebase-app-check aud/iss)
#   OPENROUTER_API_KEY                          (upstream, so a pass completes a real chat)
# (FIREBASE_API_KEY + FIREBASE_APP_ID are used by the test to MINT tokens, not by the proxy.)
version: 1

server:
  logLevel: warn

storage:
  type: memory

security:
  mode: any
  providers:
    - type: firebase-auth
      projectId: ${FIREBASE_PROJECT_ID}
    - type: firebase-app-check
      projectNumber: "${FIREBASE_PROJECT_NUMBER}"

rateLimits:
  - name: per-user-requests
    key: user
    requests: { limit: 120, window: 1m }

providers:
  openrouter:
    type: openai-compatible
    baseUrl: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    headers:
      HTTP-Referer: https://github.com/tiepvuvan/omni-model
      X-Title: omni-model auth e2e

routing:
  defaultProvider: openrouter
