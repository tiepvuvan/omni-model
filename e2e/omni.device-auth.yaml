# omni-model config for FULL on-device auth verification — all four verifiers.
#
# Deploy this (Worker + container) and point the example iOS app's verification
# screen at each; the app exercises every method against a live proxy:
#   - firebase-auth       Firebase Authentication ID token   (Authorization: Bearer)
#   - firebase-app-check  Firebase App Check token           (X-Firebase-AppCheck)
#   - apple-app-attest    Apple App Attest assertion         (x-appattest-*)   [real device]
#   - apple-device-check  Apple DeviceCheck token            (X-Apple-Device-Token) [real device]
#
# mode: any -> each request authenticates with exactly one method (each verifier
# reads a distinct header and returns null when absent), so the four are
# independent and the app can test them one at a time.
#
# Values (never commit secrets — pass via env / `wrangler secret put`):
#   FIREBASE_PROJECT_ID       plist PROJECT_ID
#   FIREBASE_PROJECT_NUMBER   plist GCM_SENDER_ID
#   APPLE_TEAM_ID             Apple Developer team id (10 chars)   -> App Attest + DeviceCheck
#   APPLE_BUNDLE_ID           app bundle id (e.g. co.unstatic.polyplan)
#   APPLE_DEVICECHECK_KEY_ID  App Store Connect DeviceCheck key id (10 chars)
#   APPLE_DEVICECHECK_KEY     the .p8 PKCS8 PEM contents (multiline; a Worker/container secret)
#   OPENROUTER_API_KEY        upstream, so a passing request completes a real chat
#
# environment/development are set to the DEVELOPMENT Apple hosts because a debug
# build run from Xcode onto a device produces development-environment tokens.
# Flip both to production for a TestFlight/App Store build.
version: 1

server:
  logLevel: info

# Node: memory is fine (single process). Worker: MUST be durable-object so the
# App Attest register (one isolate) and later assert (another) share state.
storage:
  type: memory

security:
  mode: any
  providers:
    - type: firebase-auth
      projectId: ${FIREBASE_PROJECT_ID}

    - type: firebase-app-check
      projectNumber: "${FIREBASE_PROJECT_NUMBER}"

    - type: apple-app-attest
      teamId: ${APPLE_TEAM_ID}
      bundleId: ${APPLE_BUNDLE_ID}
      environment: development

    - type: apple-device-check
      teamId: ${APPLE_TEAM_ID}
      keyId: ${APPLE_DEVICECHECK_KEY_ID}
      privateKey: ${APPLE_DEVICECHECK_KEY}
      development: true

rateLimits:
  - name: per-identity-requests
    key: user
    requests: { limit: 120, window: 1m }

providers:
  openrouter:
    type: openai-compatible
    baseUrl: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    headers:
      HTTP-Referer: https://github.com/tiepvuvan/omni-model
      X-Title: omni-model device-auth

routing:
  defaultProvider: openrouter
